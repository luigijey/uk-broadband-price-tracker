name: Deploy static broadband price tracker site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Extract online price snippets
        run: npm run extract-snippets

      - name: Extract provider deal candidates
        run: npm run extract-providers

      - name: Confirm provider direct expansion summary
        run: test -f exports/provider-direct-expansion-summary.json

      - name: Promote active online deals
        run: npm run promote-active

      - name: Build Postcode Area V1 active comparison
        run: npm run postcode-area-build

      - name: Build active summary tables
        run: npm run active-summary

      - name: Export sample pricing data
        run: npm run export

      - name: Build static site
        run: npm run build-site

      - name: Confirm generated deployment files
        run: |
          test -f site/index.html
          test -f exports/online-price-snippets.json
          test -f exports/provider-deal-candidates.json
          test -f exports/provider-deal-candidates-usable.json
          test -f exports/active-online-deals.json
          test -f exports/postcode-area-active-comparison.json
          test -f exports/provider-deal-candidates-review-only.json
          test -f exports/provider-deal-candidates-discarded.json
          test -f exports/provider-direct-expansion-summary.json
          test -f exports/postcode-check-v1-summary.json
          test -f exports/active-cheapest-by-speed-tier.json
          test -f exports/active-cheapest-by-speed-tier.csv

      - name: Upload active pricing review data
        uses: actions/upload-artifact@v4
        with:
          name: active-pricing-review-data
          if-no-files-found: error
          path: |
            exports/active-online-deals.json
            exports/active-online-deals.csv
            exports/postcode-area-active-comparison.json
            exports/postcode-area-active-comparison.csv
            exports/active-cheapest-by-speed-tier.json
            exports/active-cheapest-by-speed-tier.csv
            exports/provider-deal-candidates.json
            exports/provider-deal-candidates-usable.json
            exports/provider-deal-candidates-review-only.json
            exports/provider-deal-candidates-discarded.json
            exports/provider-direct-expansion-summary.json
            exports/postcode-check-v1-summary.json
            exports/online-price-snippets.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
